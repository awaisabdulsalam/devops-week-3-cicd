# This is simple workflow to get started woth Github Actions
name: Simple CI

# Controls when the workflow will run
on: 
  # Triggers workflow on push event but only when branch is "main" 
  push: 
    branches: [ "main" ]

# A workflow run is made up of jobs one or more that can run sequentially or in parallel 
jobs:
  # This is first and single job named "build" 
  build:
    # This is the type of runner on which job will "RUN" (Github actions provide it)
    runs-on: ubuntu-latest

    #  Steps represent the sequence of tasks that will be executed as part of a job
    steps:
      # Checkout repo under $GITHUB_WORKSPACE so your job can access it
      # Download repo code into runner(machine)
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Runs a single command using runner's shell
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
      
      # Runs a set of commands using a runner's shell
      - name: Install dependencies
        run: npm install
      
      - name: Run tests
        run: npm test

      # Add Docker login steps
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        
      # Build and push image to Docker Hub
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devops-week-3-cicd:${{ github.sha }} .

      - name: Push Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-week-3-cicd:${{ github.sha }}